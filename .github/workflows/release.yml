name: Release

# Changelog-driven release (ADR 0007, supersedes 0006's commit-driven versioning).
#
# CHANGELOG.md's newest `## [X.Y.Z]` section IS the release version — the version
# is a pure function of the towncrier changelog, so the tag can never drift from
# the changelog. On every push to `main`, if that version has no tag yet, this job
# tags it, builds the sdist + wheel (hatch-vcs derives the version from the tag),
# attaches a CycloneDX SBOM, publishes to PyPI via OIDC, and cuts a GitHub Release
# whose notes are the changelog section. It only ever creates a tag — it never
# pushes a commit to the protected `main` branch.
#
# To cut a release, run the "Prepare release" workflow: it computes the next
# version from the changelog.d/ fragments, collates them into CHANGELOG.md, and
# opens a release PR. Merging it (and promoting dev -> main) is what triggers this.
on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # create the release tag + the GitHub Release
      id-token: write   # OIDC trusted publishing to PyPI (no stored token)
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Decide release from the changelog
        id: decide
        run: |
          set -uo pipefail
          # Guard: never publish a stale changelog. If typed fragments are still
          # pending, Prepare Release has not been run for this promotion — the
          # CHANGELOG top is behind the real work, so releasing it would ship an
          # incomplete changelog. Skip until the changelog is collated.
          if pending="$(python tools/release_bump.py next 2>/dev/null)"; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::uncollated changelog fragments are pending (next=${pending}); run Prepare Release before promoting. Skipping."
            exit 0
          fi
          version="$(python tools/release_bump.py current 2>/dev/null || true)"
          if [ -z "${version}" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no version section in CHANGELOG.md; nothing to release."
            exit 0
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v${version} is already released; nothing to do."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Releasing v${version} (from CHANGELOG.md)."
          fi

      - name: Create and push the release tag
        if: steps.decide.outputs.release == 'true'
        env:
          TAG: v${{ steps.decide.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Build sdist + wheel
        if: steps.decide.outputs.release == 'true'
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist

      - name: Assert the built version matches the changelog
        if: steps.decide.outputs.release == 'true'
        env:
          EXPECTED: ${{ steps.decide.outputs.version }}
        run: |
          set -euo pipefail
          built="$(ls dist/*.whl | sed -E 's|.*/aces_scenario_packs-([0-9]+\.[0-9]+\.[0-9]+)-.*|\1|' | head -1)"
          if [ "${built}" != "${EXPECTED}" ]; then
            echo "::error::built version ${built} != changelog/tag version ${EXPECTED}"
            exit 1
          fi
          echo "built version ${built} matches the changelog/tag."

      - name: Generate CycloneDX SBOM
        if: steps.decide.outputs.release == 'true'
        run: |
          set -euo pipefail
          python -m pip install dist/*.whl cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment \
            --output-format JSON \
            --output-file sbom/aces-scenario-packs.cdx.json

      - name: Write release notes from the changelog
        if: steps.decide.outputs.release == 'true'
        run: python tools/release_bump.py notes > release-notes.md

      - name: Publish to PyPI (OIDC trusted publishing)
        if: steps.decide.outputs.release == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

      - name: Create the GitHub Release
        if: steps.decide.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.decide.outputs.version }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            dist/* sbom/aces-scenario-packs.cdx.json
