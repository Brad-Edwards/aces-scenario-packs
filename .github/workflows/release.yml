name: Release

# Conventional-commit-driven release (ADR 0006, supersedes 0005).
#
# On every push to main, python-semantic-release inspects the Conventional Commit
# messages since the last tag, computes the next SemVer, creates the tag + GitHub
# Release (with generated notes), and builds the sdist + wheel. It is tag-only —
# it never pushes a commit back to the protected main branch. The job then
# attaches a CycloneDX SBOM (ADR 0004) and publishes to PyPI via OIDC trusted
# publishing (no stored token).
#
# workflow_dispatch bootstraps the first release and is the manual override:
# run it with force=minor once after the first dev->main promotion to cut v0.1.0.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: "Force a bump when no releasable commits exist (patch|minor|major)"
        required: false
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # create the tag + GitHub Release
      id-token: write   # OIDC trusted publishing to PyPI
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Python Semantic Release (version + tag + GitHub Release + build)
        id: release
        uses: python-semantic-release/python-semantic-release@37a30a7987cfebb6d49240bf1c4e9cd9817d0673 # v10.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: ${{ github.event.inputs.force }}
          # Tag-only: never push a commit to the protected main branch. With
          # commit=false PSR makes no commit, so the branch push is a no-op and
          # only the tag (refs/tags/*, not branch-protected) is pushed. The
          # GitHub Release carries the notes; no CHANGELOG.md file is committed.
          commit: "false"
          changelog: "false"
          tag: "true"
          push: "true"
          vcs_release: "true"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Generate CycloneDX SBOM
        if: steps.release.outputs.released == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment \
            --output-format JSON \
            --output-file sbom/aces-scenario-packs.cdx.json

      - name: Attach SBOM to the GitHub Release
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "${TAG}" sbom/aces-scenario-packs.cdx.json --clobber

      - name: Publish to PyPI (OIDC trusted publishing)
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

      - name: Attach distributions to the GitHub Release
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@4f3c5d7f5caddf6535050c4bcb55f033f000a7dd # v10.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}
