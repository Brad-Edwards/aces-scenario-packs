name: Release

# Committed-literal release (ADR 0007). The version is the __version__ literal in
# src/aces_scenario_packs/__init__.py — bumped by tools/release.py together with
# the CHANGELOG.md section. On push to main, if __version__ has a matching
# CHANGELOG section and no tag yet, this tags it, builds the sdist + wheel,
# generates the SBOM, publishes to PyPI via OIDC, and cuts a GitHub Release whose
# notes are the changelog section. It only ever creates a tag — no commit is ever
# pushed to the protected main branch. All third-party actions are SHA-pinned.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  decide:
    name: Decide whether to release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.d.outputs.release }}
      version: ${{ steps.d.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: d
        run: |
          set -euo pipefail
          # Guard 1: never publish while typed changelog fragments are still
          # uncollated. A real release always collates first (tools/release.py),
          # so pending fragments mean this promotion is not a prepared release —
          # this blocks the first main promotion from publishing a half-baked
          # version before any release has been cut.
          pending="$(find changelog.d -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')"
          if [ "${pending}" != "0" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${pending} uncollated changelog fragment(s) pending; run tools/release.py first. Skipping."
            exit 0
          fi
          version="$(grep -oP '^__version__\s*=\s*"\K[^"]+' src/aces_scenario_packs/__init__.py)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v${version} is already released; nothing to do."
          elif ! grep -q "^## \[${version}\]" CHANGELOG.md; then
            # Guard: __version__ was bumped without a matching changelog section
            # (or is the unreleased 0.0.0). tools/release.py writes both together;
            # refuse to publish an un-changelogged version.
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::__version__ is ${version} but CHANGELOG.md has no [${version}] section; run tools/release.py. Skipping."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Releasing v${version}."
          fi

  release:
    name: Build, publish, and release
    needs: [decide]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # create the release tag + the GitHub Release
      id-token: write   # OIDC trusted publishing to PyPI (no stored token)
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Create and push the release tag
        env:
          V: ${{ needs.decide.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${V}" -m "Release v${V}"
          git push origin "v${V}"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          python -m pip install dist/*.whl cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment \
            --output-format JSON \
            --output-file sbom/aces-scenario-packs.cdx.json

      - name: Extract release notes from the changelog
        env:
          V: ${{ needs.decide.outputs.version }}
        run: |
          awk -v v="$V" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > notes.md
          test -s notes.md || echo "Release v${V}" > notes.md

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ needs.decide.outputs.version }}
        run: |
          gh release create "v${V}" \
            --title "v${V}" \
            --notes-file notes.md \
            dist/* sbom/aces-scenario-packs.cdx.json
