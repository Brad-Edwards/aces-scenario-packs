name: Release Please

# Release automation (ADR 0008). release-please maintains a release PR
# ("chore(main): release X.Y.Z") that bumps [project].version and CHANGELOG.md
# from the Conventional Commit history. Merging that PR creates the tag + GitHub
# Release; this workflow then builds, generates the SBOM, and publishes to PyPI
# via OIDC. Nothing is hand-run and feature PRs never edit CHANGELOG.md.
#
# The release PR is opened by GITHUB_TOKEN, so required CI checks don't auto-run
# on it — admin-merge it (or give release-please a PAT so its checks run).
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build, SBOM, and publish to PyPI
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # attach artifacts to the GitHub Release
      id-token: write   # OIDC trusted publishing to PyPI (no stored token)
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          python -m pip install dist/*.whl cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment \
            --output-format JSON \
            --output-file sbom/aces-scenario-packs.cdx.json

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

      - name: Attach dist + SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "${TAG}" dist/* sbom/aces-scenario-packs.cdx.json --clobber
