[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "aces-scenario-packs"
dynamic = ["version"]
description = "ACES scenario-pack definition, schemas, template, and authoring/validation tooling."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Brad Edwards" }]
keywords = ["aces", "scenario-pack", "cyber-range", "security"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]
dependencies = ["PyYAML>=6"]

[project.urls]
Homepage = "https://github.com/Brad-Edwards/aces-scenario-packs"
Repository = "https://github.com/Brad-Edwards/aces-scenario-packs"

[project.scripts]
aces-pack-validate = "aces_scenario_packs.content_ci:main"
aces-pack-release = "aces_scenario_packs.release:main"
aces-new-pack = "aces_scenario_packs.new_pack:main"
aces-pack-issue-skeleton = "aces_scenario_packs.issue_skeleton:main"

# Version is derived from the git tag (the release tag python-semantic-release
# creates). The tag is the single source of truth; nothing is hand-bumped.
[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "src/aces_scenario_packs/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/aces_scenario_packs"]

[tool.hatch.build.targets.sdist]
include = [
    "/src/aces_scenario_packs",
    "/docs",
    "/tests",
    "/README.md",
    "/LICENSE",
    "/CHANGELOG.md",
]

# Release automation: python-semantic-release computes the next version from
# Conventional Commit messages and creates the git tag. Tag-only (no commit is
# pushed back to the protected main branch); the changelog is emitted to the
# GitHub Release. See docs/decisions/adrs/0006-conventional-commit-releases.md.
[tool.semantic_release]
tag_format = "v{version}"
allow_zero_version = true
major_on_zero = false
build_command = "python -m pip install build && python -m build"
# NOTE: commit/tag/push/changelog behaviour (tag-only, no branch commit) is set
# on the release workflow's action inputs, not here — they are not pyproject keys.

[tool.semantic_release.branches.main]
match = "main"
