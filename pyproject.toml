[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "aces-scenario-packs"
dynamic = ["version"]
description = "ACES scenario-pack definition, schemas, template, and authoring/validation tooling."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Brad Edwards" }]
keywords = ["aces", "scenario-pack", "cyber-range", "security"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]
dependencies = ["PyYAML>=6"]

[project.urls]
Homepage = "https://github.com/Brad-Edwards/aces-scenario-packs"
Repository = "https://github.com/Brad-Edwards/aces-scenario-packs"

[project.scripts]
aces-pack-validate = "aces_scenario_packs.content_ci:main"
aces-pack-release = "aces_scenario_packs.release:main"
aces-new-pack = "aces_scenario_packs.new_pack:main"
aces-pack-issue-skeleton = "aces_scenario_packs.issue_skeleton:main"

# Version is derived from the git tag (the release tag the release workflow
# creates from CHANGELOG.md). The tag is the source of truth; nothing is hand-bumped.
[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "src/aces_scenario_packs/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/aces_scenario_packs"]

[tool.hatch.build.targets.sdist]
include = [
    "/src/aces_scenario_packs",
    "/docs",
    "/tests",
    "/README.md",
    "/LICENSE",
    "/CHANGELOG.md",
]

# Release automation is changelog-driven (ADR 0007): the version is computed from
# the changelog.d/ fragment types by tools/release_bump.py, written into
# CHANGELOG.md by towncrier, and tagged by the release workflow. hatch-vcs derives
# the built version from that tag. There is no version string to edit and no
# commit-message-driven versioning tool.
