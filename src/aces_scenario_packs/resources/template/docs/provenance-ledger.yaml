# Provenance ledger — the machine-readable source/licensing/safety/publication
# /overlay-boundary contract for this pack. REQUIRED: pack.yaml points at it via
# `provenance_ledger:` and scripts/ci/scenario_content_ci.py validates it.
# docs/lineage.md stays human prose and cites this ledger; this file is the
# source of truth. Schema: ../../provenance.schema.yaml. Worked example:
# provenance-ledger.example.yaml.
#
# ACES is the authority for pack TRUST. A pack is a `reusable_scenario` asset in
# the ACES reusable-asset-trust-policy/v1 (ACES ADR-071); ACES owns integrity/
# authenticity/provenance-lock/governance-source/checksum. This ledger is scoped
# to pack-domain facts ACES does not define (below) and re-defines none of them
# (ADR 0009/ADR 0010).
#
# Distribution classes (open | redistributable | internal-only | commercial-only
# | generated | customer-specific) describe publishing/redistribution rights and
# are SEPARATE from pack.compatibility.yaml's runtime-visibility export values.
schema_version: "scenario-pack-provenance/v1"
pack:
  name: <name>                   # must match pack.yaml name

# Every upstream corpus, framework, tool, dataset, research report, original
# design, generated material, or customer-overlay source. Each is a row with a
# stable source_id artifacts can cite. At least one row is required.
sources:
  - source_id: original-design
    kind: original               # framework|emulation-corpus|tooling|dataset|research|original|generated|customer-overlay
    name: "ACES original scenario design"
    license: "proprietary"       # SPDX id, or proprietary|internal|MITRE ATT&CK Terms of Use|n-a
    usage: reused                # derived|adapted|referenced|reused|reimplemented|generated-from|excluded
    attribution_required: false
    used: "All bespoke pack content."
    # url:, ref: (commit/version pin), attribution:, excluded:, captured: are optional.

# Classify the pack-relative roots that make up the pack. path may be a directory
# or a file; classification is the default distribution class for content under it.
artifacts:
  - artifact_id: docs
    path: docs/
    classification: commercial-only
    sources: [original-design]
    description: "Pack documentation."

# Mandatory safety attestations — ALL must be true (the policy is exclusion of
# real sensitive content, not a weaker class).
content_safety:
  no_real_malware: true
  no_real_third_party_targets: true
  no_real_credentials: true
  no_sensitive_data: true
  offensive_tooling_boundary: true
  notes: ""

# Publication review modelled as data. The licensing, attribution, sensitive-data,
# and offensive-tooling gates are required; customer-overlay is optional.
review:
  status: pending                # pending|approved|blocked
  gates:
    - gate_id: licensing
      status: pending            # pending|approved|blocked|not-applicable
    - gate_id: attribution
      status: pending
    - gate_id: sensitive-data
      status: pending
    - gate_id: offensive-tooling
      status: pending

# Optional: declare customer-overlay slots. Overlay roots stay path-contained and
# never overlap base artifact roots; customer-specific artifacts live only here.
# overlays:
#   - overlay_id: <customer>
#     root: overlays/<customer>/
#     classification: customer-specific
#     description: "Private overlay; removable without contaminating the base pack."
