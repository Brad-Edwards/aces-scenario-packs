schema_version: 1
pack:
  name: example-commercial-pack
  title: "Example Commercial Pack"
  version: 1.0.0
  status: golden
  source:
    requirement: EXR-0001
    issues: [44]
    upstream_references:
      - https://github.com/Brad-Edwards/aces-scenario-packs/issues/44

artifact_boundaries:
  participant_visible:
    - path: public/briefing.md
      export: public
      description: Redistributable participant briefing.
  operator_only:
    - path: operator/runbook.md
      export: commercial
      description: Commercial operator runbook.
  oracle_only:
    - path: oracle/success-states.yaml
      export: private
      description: Hidden validation oracle.
  commercial:
    - path: profiles/
      export: commercial
      description: Audience-specific delivery bundles.

runtime_profiles:
  - profile_id: local_minimal
    status: supported
    provider: docker
    description: Local fast-feedback reference profile.
    build:
      - path: build/docker-compose.yml
    tests:
      - path: tests/smoketest.py
    walkthroughs:
      - path: docs/walkthroughs/local-minimal.md
  - profile_id: aws_full
    status: required
    provider: aws
    description: Live golden profile used for participant-equivalent proof.
    build:
      - path: build/aws/
    tests:
      - path: tests/aws_rehearsal.py
    walkthroughs:
      - path: docs/walkthroughs/aws-full.md

delivery_bundles:
  - bundle_id: guided
    status: supported
    audience: guided
    manifest:
      path: profiles/bundles.yaml
    participant_paths:
      - path: profiles/guided/participant/
    operator_paths:
      - path: profiles/guided/operator/
    validation:
      - path: profiles/validate_profiles.py
  - bundle_id: unguided
    status: supported
    audience: unguided
    manifest:
      path: profiles/bundles.yaml
    participant_paths:
      - path: profiles/unguided/participant/
    operator_paths: []
    validation:
      - path: profiles/validate_profiles.py
  - bundle_id: purple-team
    status: supported
    audience: purple-team
    manifest:
      path: profiles/bundles.yaml
    participant_paths: []
    operator_paths:
      - path: profiles/purple-team/operator/
    validation:
      - path: profiles/validate_profiles.py
  - bundle_id: agent-benchmark
    status: supported
    audience: agent-benchmark
    manifest:
      path: profiles/bundles.yaml
    participant_paths:
      - path: profiles/agent-benchmark/participant/
    operator_paths:
      - path: profiles/agent-benchmark/operator/
    validation:
      - path: profiles/validate_profiles.py
  - bundle_id: demo
    status: supported
    audience: demo
    manifest:
      path: profiles/bundles.yaml
    participant_paths: []
    operator_paths:
      - path: profiles/demo/operator/
    validation:
      - path: profiles/validate_profiles.py

platform_features:
  - feature_id: real-ad-domain
    status: required
    runtime_profiles: [aws_full]
    description: A real Active Directory forest is required in the golden range.
  - feature_id: ctfd
    status: optional
    runtime_profiles: [aws_full]
    description: Reference CTFd loader for the pack's flag/challenge layer.

assets:
  - asset_id: participant-briefing
    path: public/briefing.md
    visibility: participant
    status: shipped
  - asset_id: operator-runbook
    path: operator/runbook.md
    visibility: operator
    status: shipped
  - asset_id: oracle-success-states
    path: oracle/success-states.yaml
    visibility: oracle
    status: shipped

operator_surfaces:
  - surface_id: range-ops-runbook
    path: operator/runbook.md
    role: range_ops
    visibility: operator
    status: shipped
  - surface_id: oracle-map
    path: oracle/success-states.yaml
    role: validator
    visibility: oracle
    status: shipped

validation:
  commands:
    - id: manifest
      command: python3 scripts/ci/scenario_content_ci.py
      validates:
        - manifest
        - visibility
        - schema
  gates:
    - id: manifest-schema
      kind: schema
      paths:
        - path: pack.compatibility.yaml
    - id: participant-leak-scan
      kind: leak-scan
      paths:
        - path: public/
