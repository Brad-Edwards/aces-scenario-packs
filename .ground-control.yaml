schema_version: 1
project: aces-scenario-packs
github_repo: Brad-Edwards/aces-scenario-packs
short_code: ASP
workflow:
  test_command: python3 -m unittest discover -s tests
  completion_command: python3 -m unittest discover -s tests && PYTHONPATH=src python3 -m aces_scenario_packs.content_ci --repo . && PYTHONPATH=src python3 -m aces_scenario_packs.release check --all
  lint_command: python3 -m compileall src tests
  format_command: python3 -m compileall src tests
docs:
  adr_dir: docs/decisions/adrs/
  workflow_reference: docs/scenario-packs.md
example_paths:
  source: src/aces_scenario_packs/
  test: tests/
requirements:
  uid_examples:
    - ASP-0001
    - ASP-0002
sonarcloud:
  project_key: Brad-Edwards_aces-scenario-packs
  organization: brad-edwards
architecture:
  vocabulary:
    patterns:
      - name: Companion contract repository
        applies_to: scenario-pack definition and authoring tooling
        example_path: docs/scenario-packs.md
    boundary_contract:
      description: ACES core owns SDL semantics; this repository owns the scenario-pack definition, schemas, template, and authoring/validation tooling. It does not host actual scenario packs.
    binding_adrs: []
    anti_recommendations:
      - Do not host actual scenario packs here; this repo is the definition and tooling only.
      - Do not encode downstream catalog vocabulary into canonical pack terminology.
