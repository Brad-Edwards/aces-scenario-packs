# SonarCloud Configuration
# https://sonarcloud.io/project/overview?id=Brad-Edwards_aces-scenario-packs

sonar.projectKey=Brad-Edwards_aces-scenario-packs
sonar.organization=brad-edwards

# Quality gate: make the scanner wait for the SonarCloud quality gate and fail
# the CI `sonar` job when the gate fails, so nothing merges past a failing gate.
# The project's assigned gate must be the strict gate that fails on any new
# issue (mirroring `aces-strict` on Brad-Edwards_aces); this file only enforces
# that CI blocks on whatever gate the project is assigned.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=600

# Source and test directories. Production code lands under tools/ as the
# companion tooling migrates in; tests live under tests/.
sonar.sources=tools
sonar.tests=tests

# Exclusions
sonar.exclusions=\
  **/__pycache__/**,\
  **/.venv/**,\
  **/build/**,\
  **/dist/**,\
  **/*.egg-info/**

# Python
sonar.python.version=3.12

# Coverage. CI generates coverage.xml with coverage.py (see
# .github/workflows/ci.yml and .coveragerc); the scanner maps it onto the
# tools/ sources.
sonar.python.coverage.reportPaths=coverage.xml
