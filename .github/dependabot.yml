version: 2
updates:
  # Keep SHA-pinned GitHub Actions patched (ADR 0006 supply-chain). CI-only, so
  # `chore` (no release). Batched into a single PR and auto-merged on a green
  # `verify` gate (ADR 0016).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: dev
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

  # Runtime Python dependencies (PyYAML, aces-sdl). They ship inside the
  # installed package, so a bump is `fix(deps)` — it cuts a patch release
  # (ADR 0016) so consumers actually receive the new floor. aces-sdl is left as
  # its own (ungrouped) PR and is NOT auto-merged: advancing the pinned ACES
  # dependency stays a human-reviewed decision (ADR 0011). Its CI compatibility
  # gate still runs automatically on the Dependabot PR.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    target-branch: dev
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: fix
      include: scope
