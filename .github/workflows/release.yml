name: Release

# Tag-triggered release (ADR 0003 / 0004): build sdist + wheel, generate a
# CycloneDX SBOM, publish to PyPI via OIDC trusted publishing (no stored token),
# and cut a GitHub Release carrying the wheel, sdist, and SBOM.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist

      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install dist/*.whl
          python -m pip install cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment \
            --output-format JSON \
            --output-file sbom/aces-scenario-packs.cdx.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*
            sbom/*

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # create the GitHub Release
      id-token: write    # OIDC trusted publishing to PyPI
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dist/*
            artifacts/sbom/*
          generate_release_notes: true
