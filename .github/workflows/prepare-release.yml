name: Prepare release

# Cut a release (ADR 0007). Computes the next version from the changelog.d/
# fragments (the fragment TYPE decides the bump: breaking/removed -> major,
# added/changed/deprecated -> minor, security/fixed -> patch), collates them into
# CHANGELOG.md with towncrier, and opens a release PR into dev. Merging that PR
# and promoting dev -> main triggers the Release workflow, which tags and
# publishes exactly the version this PR wrote into CHANGELOG.md — so the tag and
# the changelog can never drift.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override the computed version (optional, e.g. 1.0.0)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Check out dev
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Compute version, build changelog, open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVERRIDE: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          python -m pip install towncrier
          if [ -n "${OVERRIDE}" ]; then
            version="${OVERRIDE}"
          elif ! version="$(python tools/release_bump.py next)"; then
            echo "::error::No release-worthy changelog fragments in changelog.d/. Nothing to release."
            exit 1
          fi
          echo "Preparing release v${version}"
          python -m towncrier build --version "${version}" --date "$(date -u +%F)" --yes
          branch="release/v${version}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add -A
          git commit -m "chore(release): v${version}"
          git push origin "${branch}"
          gh pr create --base dev --head "${branch}" \
            --title "chore(release): v${version}" \
            --body "Automated release prep for v${version} (ADR 0007). Merge this, then promote dev -> main to tag + publish v${version}."
