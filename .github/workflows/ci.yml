name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Dependency vulnerability audit
        run: |
          python -m pip install pip-audit
          # Retry: the advisory API is network-dependent, so a transient blip
          # should not fail the build. A real vulnerability fails all attempts.
          for i in 1 2 3; do
            if pip-audit; then exit 0; fi
            echo "pip-audit attempt $i failed; retrying in 10s..."
            sleep 10
          done
          echo "pip-audit failed after 3 attempts"
          exit 1

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Scenario-content gate
        run: aces-pack-validate --repo .

      - name: Pack release gate
        run: aces-pack-release check --all

  sonar:
    runs-on: ubuntu-latest
    needs: [verify]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Generate coverage report
        run: |
          python -m pip install -e . coverage
          coverage run -m unittest discover -s tests
          coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
