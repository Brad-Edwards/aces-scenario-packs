name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Unit tests
        run: python3 -m unittest discover -s scripts/ci/tests

      - name: Scenario-content gate
        run: python3 scripts/ci/scenario_content_ci.py

      - name: Pack release gate
        run: python3 scripts/ci/pack_release.py check --all

  sonar:
    runs-on: ubuntu-latest
    needs: [verify]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate coverage report
        run: |
          python3 -m pip install -r requirements.txt coverage
          coverage run -m unittest discover -s scripts/ci/tests
          coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
