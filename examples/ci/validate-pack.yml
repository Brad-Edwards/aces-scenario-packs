# Example CI workflow for validating an ACES scenario pack.
#
# Copy this file into your pack repository at
# .github/workflows/validate-pack.yml and set PACK_DIR to the directory that
# holds your pack records. It runs the static ACES scenario-pack checks (schema
# validation, leak scan, release cross-check) with no secrets, no tokens, and no
# private repository state: everything it needs is public.
name: Validate ACES scenario pack

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Directory in your repository holding the pack records (<family>.json).
      PACK_DIR: pack
    steps:
      - name: Check out the pack repository
        uses: actions/checkout@v4

      - name: Check out the ACES scenario-pack contract and tooling
        uses: actions/checkout@v4
        with:
          repository: Brad-Edwards/aces-scenario-packs
          ref: main
          path: _aces-scenario-packs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate pack records against published schemas
        run: |
          PYTHONPATH=_aces-scenario-packs/tools \
            python3 -m aces_pack_tools validate "$PACK_DIR" \
              --schema-index _aces-scenario-packs/schemas/index.json

      - name: Scan the pack for leaked secrets or denylisted vocabulary
        run: |
          PYTHONPATH=_aces-scenario-packs/tools \
            python3 -m aces_pack_tools leak "$PACK_DIR"

      - name: Cross-check the release record (when present)
        if: ${{ hashFiles(format('{0}/release.json', env.PACK_DIR)) != '' }}
        run: |
          PYTHONPATH=_aces-scenario-packs/tools \
            python3 -m aces_pack_tools release "$PACK_DIR/release.json" \
              --schema-index _aces-scenario-packs/schemas/index.json
