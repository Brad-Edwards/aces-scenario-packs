# Worked example of a pack provenance ledger. Schema-checked by
# scripts/ci/scenario_content_ci.py against ../provenance.schema.yaml. This is a
# fully-populated reference (sources, artifact classification, safety
# attestations, the publication review gate, and a customer overlay); a real
# pack's docs/provenance-ledger.yaml carries only the rows that apply to it.
schema_version: 1
pack:
  name: example-commercial-pack
  title: "Example Commercial Pack"
  version: 1.0.0

sources:
  - source_id: mitre-attack
    kind: framework
    name: "MITRE ATT&CK"
    url: https://attack.mitre.org/
    ref: "ATT&CK v15"
    license: "MITRE ATT&CK Terms of Use"
    usage: referenced
    attribution_required: true
    attribution: "© 2015–2026 The MITRE Corporation. ATT&CK® is a registered trademark of The MITRE Corporation."
    used: "Technique IDs for the canonical path mappings."
  - source_id: ctid-ael
    kind: emulation-corpus
    name: "MITRE CTID — Adversary Emulation Library"
    url: https://github.com/center-for-threat-informed-defense/adversary_emulation_library
    ref: "master @ <commit>"
    license: "Apache-2.0"
    usage: derived
    attribution_required: true
    attribution: "Derived from the MITRE Center for Threat-Informed Defense Adversary Emulation Library (Apache-2.0)."
    used: "Scenario step structure and per-step technique selection."
    excluded: "No upstream binaries, Resources/ payloads, or password-protected malware samples."
    captured: "2026-06-21"
  - source_id: original-design
    kind: original
    name: "ACES original scenario design"
    license: "proprietary"
    usage: reused
    attribution_required: false
    used: "All bespoke SDL, narrative, hosts, identities, and synthetic credentials."
  - source_id: synthetic-seed
    kind: generated
    name: "Range-generated synthetic dataset"
    license: "proprietary"
    usage: generated-from
    attribution_required: false
    used: "Seed-generated, range-namespaced synthetic content. No real data."

artifacts:
  - artifact_id: briefing
    path: docs/concepts.md
    classification: open
    sources: [original-design]
    description: "Participant-facing briefing; publishable."
  - artifact_id: attack-path
    path: docs/attack-path.md
    classification: commercial-only
    sources: [ctid-ael, mitre-attack, original-design]
    description: "Operator path doc derived from the emulation corpus."
  - artifact_id: customer-overlay-content
    path: overlays/acme/branding.md
    classification: customer-specific
    sources: [original-design]
    description: "Customer-specific branding; never part of the base export."

content_safety:
  no_real_malware: true
  no_real_third_party_targets: true
  no_real_credentials: true
  no_sensitive_data: true
  offensive_tooling_boundary: true
  notes: "Behaviour modelled with safe, range-local stand-ins; no vendored offensive tooling."

review:
  status: approved
  reviewer: "ACES review"
  date: "2026-06-29"
  gates:
    - gate_id: licensing
      status: approved
      notes: "Upstream Apache-2.0 + ATT&CK Terms of Use compatible with redistribution and commercial use."
    - gate_id: attribution
      status: approved
      notes: "Attribution notices recorded for every attribution_required source."
    - gate_id: sensitive-data
      status: approved
      notes: "No real credentials, PHI, payment data, or customer identifiers."
    - gate_id: offensive-tooling
      status: approved
      notes: "Technique emulation and safe stand-ins only; no real malware or C2."
    - gate_id: customer-overlay
      status: approved
      notes: "Customer-specific content path-contained under overlays/."

overlays:
  - overlay_id: acme
    root: overlays/acme/
    classification: customer-specific
    description: "Private overlay for ACME; removable without contaminating the base pack."
