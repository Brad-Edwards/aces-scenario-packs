name: Dependabot auto-merge

# A1 (ADR 0016): auto-merge low-risk dependency bumps once the CI `verify` gate
# is green, so routine patching needs no human. The load-bearing `aces-sdl` pin
# is deliberately EXCLUDED — advancing the pinned ACES dependency stays a
# human-reviewed decision (ADR 0011). Its compatibility gate still runs
# automatically on the Dependabot PR; a person reviews the green PR and merges.
#
# `gh pr merge --auto` enables GitHub native auto-merge, which holds the PR until
# dev's required `verify` check passes. This requires the repo setting
# `allow_auto_merge` and branch protection on `dev` requiring `verify` (ADR 0016).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only Dependabot PRs; fetch-metadata below only works for those events.
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for eligible bumps
        # Exclude the pinned ACES dependency (ADR 0011). The only pip deps are
        # PyYAML and aces-sdl, and no other package name contains the substring
        # "aces-sdl", so this guard is exact for this repo.
        if: ${{ !contains(steps.meta.outputs.dependency-names, 'aces-sdl') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
