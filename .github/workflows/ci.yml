name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Dependency vulnerability audit
        run: |
          python -m pip install pip-audit
          # Retry: the advisory API is network-dependent, so a transient blip
          # should not fail the build. A real vulnerability fails all attempts.
          for i in 1 2 3; do
            if pip-audit; then exit 0; fi
            echo "pip-audit attempt $i failed; retrying in 10s..."
            sleep 10
          done
          echo "pip-audit failed after 3 attempts"
          exit 1

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Scenario-content gate
        run: aces-pack-validate --repo .

      - name: Pack release gate
        run: aces-pack-release check --all

  sonar:
    runs-on: ubuntu-latest
    needs: [verify]
    # SonarCloud needs SONAR_TOKEN, which GitHub withholds from PRs that don't
    # carry repository secrets: forks and Dependabot PRs (Dependabot runs read a
    # separate secret store that this token isn't in). Skip both — the scan still
    # runs on the post-merge push to dev/main with full token access, so the
    # quality gate covers the integrated code. Dependency bumps don't touch
    # sonar.sources (src/) anyway, so there is nothing new to analyze here.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Generate coverage report
        run: |
          python -m pip install -e . coverage
          coverage run -m unittest discover -s tests
          coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
