name: Release Please

# Release automation (ADR 0008). release-please maintains a release PR
# ("chore(main): release X.Y.Z") that bumps [project].version and CHANGELOG.md
# from the Conventional Commit history. Merging that PR creates the tag + GitHub
# Release; this workflow then builds, generates the SBOM, and publishes to PyPI
# via OIDC. Nothing is hand-run and feature PRs never edit CHANGELOG.md.
#
# The release PR is opened by GITHUB_TOKEN, so required CI checks don't auto-run
# on it — admin-merge it (or give release-please a PAT so its checks run).
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build, SBOM, and publish to PyPI
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # attach artifacts to the GitHub Release
      id-token: write   # OIDC trusted publishing to PyPI (no stored token)
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          python -m pip install dist/*.whl cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment \
            --output-format JSON \
            --output-file sbom/aces-scenario-packs.cdx.json

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

      - name: Attach dist + SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "${TAG}" dist/* sbom/aces-scenario-packs.cdx.json --clobber
